<!DOCTYPE html>
<html>
<head>
  <title>Display file : {{ doc_id }}</title>

  <style>
    body {
      font-family: 'Poppins', sans-serif; 
      padding: 40px;
      max-width: 900px; 
      margin: auto;
      background: #fff;
      color: #000;
      line-height: 1.6;
    }

    #bg-video,
    .overlay {
      display: none;
    }

    body.dark #bg-video,
    body.dark .overlay {
      display: block;
    }

    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: -1;
    }

    body.dark {
      background: transparent;
      color: white;
    }

    .back-btn {
      color: #4285F4;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 20px;
    }

    pre {
      background: #f4f4f4;
      padding: 25px;
      border-radius: 12px;
      
      white-space: pre-wrap;       
      word-wrap: break-word;       
      overflow-wrap: break-word;
      
      font-family: inherit; 
      font-size: 15px;
      border: 1px solid #ddd;
    }

    body.dark pre {
      background: rgba(30, 30, 30, 0.8);
      border-color: #444;
      color: #eee;
    }

    mark {
      background: #fbbc05; 
      color: black;
      padding: 2px;
      border-radius: 3px;
    }
  </style>
</head>

<body>

  <video autoplay muted loop id="bg-video">
    <source src="{{ url_for('static', filename='background.mp4') }}" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <a href="/" class="back-btn">← Back to Search</a>
  <h2 style="margin-bottom: 10px;">{{ doc_id }}</h2>
  <hr style="opacity: 0.2; margin-bottom: 30px;">

  <div id="content-area">
    <pre>{{ content }}</pre>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/mark.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const mode = localStorage.getItem("theme");
      if (mode === "dark") {
        document.body.classList.add("dark");
      }

      var context = document.querySelector("#content-area");
      var instance = new Mark(context);
      var keyword = "{{ query }}";

      if (keyword && keyword !== "None") {
        instance.mark(keyword);
      }
    });
  </script>

</body>
</html>

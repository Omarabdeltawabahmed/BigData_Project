<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Google 🔍</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.8s ease-in;
      background-color: #f8f9fa;
      color: #000;
    }

    #bg-video, .overlay { display: none; }

    body.dark #bg-video,
    body.dark .overlay { display: block; }

    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      width: 100%; height: 100%;
      z-index: -1;
      background: rgba(0,0,0,0.4);
    }

    body.dark {
      background: transparent;
      color: white;
    }

    header {
      margin-top: 50px;
      margin-bottom: -30px;
      text-align: center;
    }

    h1 { font-size: 60px; }

    h1 span:nth-child(1) { color: #4285f4; }
    h1 span:nth-child(2) { color: #ea4335; }
    h1 span:nth-child(3) { color: #fbbc05; }
    h1 span:nth-child(4) { color: #4285f4; }
    h1 span:nth-child(5) { color: #34a853; }
    h1 span:nth-child(6) { color: #ea4335; }

    body.dark h1 span {
      color: white !important;
    }

    .search-box {
      width: 100%;
      max-width: 600px;
      text-align: center;
      margin-bottom: 30px;
    }

    .search-container { position: relative; width: 100%; }
    .icon { position: absolute; right: 15px; top: 12px; color: gray; }

    input {
      width: 90%;
      padding: 15px 40px 15px 20px;
      font-size: 16px;
      border-radius: 30px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.9);
      transition: 0.3s;
    }

    body.dark input {
      background: rgba(30,30,30,0.8);
      color: white;
    }

    .search-btn {
      margin-top: 20px;
      padding: 10px 30px;
      border-radius: 20px;
      cursor: pointer;
      background-color: #4285f4; 
      color: white;
      font-weight: bold;
      border: none;
      transition: 0.3s;
    }

    body.dark .search-btn {
      background-color: #34a853; 
    }

    .search-btn:hover { transform: scale(1.05); }

    .toggle-btn {
      position: absolute;
      right: 20px; top: 20px;
      cursor: pointer;
      font-size: 20px;
    }

    .results-container {
      width: 100%;
      max-width: 700px;
      padding: 20px;
    }

    .result-item {
      margin-bottom: 25px;
      padding: 18px;
      border-radius: 12px;
      background: white;
      transition: 0.3s;
      animation: fadeIn 0.5s ease-in;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    body.dark .result-item { background: rgba(30,30,30,0.8); }

    .result-url {
      font-size: 14px;
      color: #555;
      word-break: break-all;
    }

    body.dark .result-url { color: #ccc; }

    .result-title {
      font-size: 19px;
      color: #1a0dab;
      text-decoration: none;
      font-weight: 500;
      width: fit-content;
    }

    body.dark .result-title { color: #8ab4f8; }

    .badge {
      font-size: 11px;
      background: #e8f0fe;
      color: #1967d2;
      padding: 3px 10px;
      border-radius: 10px;
      width: fit-content;
      margin-top: 5px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <video autoplay muted loop id="bg-video">
    <source src="{{ url_for('static', filename='background.mp4') }}" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="toggle-btn" onclick="toggleMode()" id="modeIcon">🌙</div>

  <header>
    <h1>
      <span>M</span><span>i</span><span>n</span><span>i</span><span>G</span><span>o</span>
    </h1>
  </header>

  <div class="search-box">
    <form method="POST" onsubmit="return handleSearchSubmit();">
      <div class="search-container">
        <span class="icon">🔍</span>
        <input type="text" name="query" placeholder="Search..." value="{{query}}" />
      </div>
      <button class="search-btn" type="submit">Search</button>
    </form>
  </div>

  <div class="results-container" id="resultsBox">
    {% if results %}
    <p>Found {{ results|length }} results</p>
    {% for result in results %}
    <div class="result-item">
      <span class="result-url">{{ result.url }}</span>
      <a class="result-title" href="/view/{{ result.id }}?q={{ query }}">
        result from wikipedia - {{ result.id }}
      </a>
      <span class="badge">Repeat: {{ result.score }}</span>
    </div>
    {% endfor %}
    {% elif query %}
    <p>😞 No results for "{{ query }}"</p>
    {% endif %}
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const mode = localStorage.getItem("theme");
      const icon = document.getElementById("modeIcon");
      if (mode === "dark") {
        document.body.classList.add("dark");
        icon.innerText = "☀️";
      }
    });

    function toggleMode() {
      const icon = document.getElementById("modeIcon");
      document.body.classList.toggle("dark");
      if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
        icon.innerText = "☀️";
      } else {
        localStorage.setItem("theme", "light");
        icon.innerText = "🌙";
      }
    }

    function handleSearchSubmit() {
      const input = document.querySelector("input[name='query']");
      const resultsBox = document.getElementById("resultsBox");
      if (input.value.trim() === "") {
        if (resultsBox) resultsBox.innerHTML = "";
        return false; 
      }
      return true;
    }
  </script>
</body>
</html>
